services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: arsw-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: arsw-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 10 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic orders --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic payments --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic inventory --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      echo 'Topics creados exitosamente'"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: arsw-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: arsw-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
